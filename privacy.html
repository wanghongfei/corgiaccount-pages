  <h1>柯基记账本 - 隐私政策</h1>

  <p>更新日期：2026 年 7 月 2 日</p>

  <h2>1. 数据存储</h2>
  <p>柯基记账本是一款本地记账 App。用户录入的账单、分类、备注等数据保存在用户设备本地。</p>

  <h2>2. 数据收集</h2>
  <p>本 App 不收集用户个人信息，不上传账单数据，不进行账号登录，不向第三方共享用户数据。</p>

  <h2>3. 网络连接</h2>
  <p>本 App 不依赖网络服务运行。</p>

  <h2>4. 数据删除</h2>
  <p>用户可以在 App 内删除账单数据。删除 App 也可能导致本地数据被删除。</p>

  <h2>5. 联系方式</h2>
  <p>如有隐私相关问题，请联系：brucewhf@126.com</p>
