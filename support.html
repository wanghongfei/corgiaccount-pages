  <p>如果你在使用柯基记账本时遇到问题，可以通过以下方式联系开发者。</p>

  <h2>支持邮箱</h2>
  <p>Email: brucewhf@126.com</p>

  <h2>常见问题</h2>

  <h3>1. App 是否需要联网？</h3>
  <p>不需要。柯基记账本为本地记账 App，账单数据保存在设备本地。</p>

  <h3>2. App 是否会上传我的账单？</h3>
  <p>不会。App 不上传账单数据，不收集用户个人信息。</p>

  <h3>3. 删除 App 后数据还在吗？</h3>
  <p>如果删除 App，本地数据可能会随 App 一起删除。请在删除前确认是否已经导出或备份重要数据。</p>
