  <h2>主要功能</h2>
  <ul>
    <li>本地记录收入与支出</li>
    <li>账单明细查看</li>
    <li>分类管理</li>
    <li>统计、搜索、导入导出</li>
    <li>数据完全本地存储</li>
  </ul>
